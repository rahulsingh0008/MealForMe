<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — MealForMe</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar">
  <div class="container navbar__inner">
    <a href="index.html" class="navbar__logo">Meal<span>ForMe</span></a>
    <div class="navbar__links">
      <a href="login.html" class="nav-link">Already have an account? <strong>Log In →</strong></a>
    </div>
  </div>
</nav>

<!-- ── Register Form ── -->
<div class="auth-page page">
  <div class="auth-card">
    <div class="auth-card__header">
      <div style="font-size:2.4rem;margin-bottom:8px">🌟</div>
      <h2>Create account</h2>
      <p>Join MealForMe and find the best meals around you</p>
    </div>

    <div id="reg-alert" class="alert"></div>

    <div id="reg-form">
      <div class="form-row">
        <div class="form-group">
          <label for="fname">First Name</label>
          <input class="form-control" type="text" id="fname" placeholder="Arjun" autocomplete="given-name" />
        </div>
        <div class="form-group">
          <label for="lname">Last Name</label>
          <input class="form-control" type="text" id="lname" placeholder="Sharma" autocomplete="family-name" />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input class="form-control" type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="area">Your Area</label>
        <input class="form-control" type="text" id="area" placeholder="e.g. Baner, Kharadi, Viman Nagar" autocomplete="address-level2" />
      </div>

      <div class="form-group">
        <label for="password">Password <span style="font-weight:400;text-transform:none;letter-spacing:0">(min. 6 characters)</span></label>
        <input class="form-control" type="password" id="password" placeholder="••••••••" autocomplete="new-password" />
      </div>

      <button id="btn-register" class="btn btn--primary btn--block" style="margin-top:8px">
        Create Account
      </button>
    </div>

    <div class="auth-card__footer">
      Already a member? <a href="login.html">Log in instead</a>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script type="module" src="js/register.js"></script>
</body>
</html>
